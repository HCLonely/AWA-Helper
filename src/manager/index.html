  <style>
    font.green{color: darkgreen;}
    font.gray{color: gray;}
    font.blue{color: blue;}
    font.yellow{color: darkorange;}
    font.red{color: red;}
    h1,h2{text-align: center;}
    #quest-info *{border: 1px solid #000;}
    body{margin-top: 20px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh;}
    footer{text-align: center;color: grey;}
    footer a{text-decoration: none;}
    #log-area{height: 300px;overflow-y: auto;}
    #log-area li:last-child {font-weight: bold;}

    /* Button Area Styling */
    .button-section {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      padding: 25px;
      margin: 20px auto;
      max-width: 1000px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #495057;
      margin-bottom: 15px;
      text-align: center;
      position: relative;
    }

    .section-title::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 2px;
      background: linear-gradient(90deg, #007bff, #6c757d);
      border-radius: 1px;
    }

    .btn-group-custom {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }

    .btn-custom {
      border-radius: 8px;
      padding: 10px 20px;
      font-weight: 500;
      transition: all 0.3s ease;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      min-width: 140px;
    }

    .btn-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .btn-primary.btn-custom {
      background: linear-gradient(135deg, #007bff, #0056b3);
    }

    .btn-success.btn-custom {
      background: linear-gradient(135deg, #28a745, #1e7e34);
    }

    .btn-danger.btn-custom {
      background: linear-gradient(135deg, #dc3545, #c82333);
    }

    .btn-warning.btn-custom {
      background: linear-gradient(135deg, #ffc107, #e0a800);
      color: #212529;
    }

    /* Status Information Styling */
    .status-info-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 10px;
    }

    .status-item {
      background: rgba(248, 249, 250, 0.8);
      border-radius: 10px;
      padding: 20px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .status-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(135deg, #007bff, #28a745);
      border-radius: 0 2px 2px 0;
    }

    .status-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      background: rgba(255, 255, 255, 0.95);
    }

    .status-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #495057;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .status-label i {
      color: #007bff;
      width: 16px;
      text-align: center;
    }

    .status-value {
      font-size: 1.1rem;
      font-weight: 500;
      color: #212529;
      padding-left: 24px;
    }

    .status-link {
      color: #007bff;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .status-link:hover {
      color: #0056b3;
      text-decoration: none;
      transform: translateX(2px);
    }

    .status-link i {
      font-size: 0.8rem;
    }

    /* Log Area Styling */
    .log-container {
      background: rgba(248, 249, 250, 0.8);
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.05);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .log-header {
      background: rgba(255, 255, 255, 0.9);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      padding: 12px 20px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .log-controls {
      display: flex;
      gap: 8px;
    }

    .log-control-btn {
      background: rgba(0, 123, 255, 0.1);
      border: 1px solid rgba(0, 123, 255, 0.2);
      border-radius: 6px;
      padding: 6px 10px;
      color: #007bff;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 32px;
    }

    .log-control-btn:hover {
      background: rgba(0, 123, 255, 0.2);
      border-color: rgba(0, 123, 255, 0.4);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 123, 255, 0.2);
    }

    .log-control-btn:active {
      transform: translateY(0);
    }

    .log-content {
      height: 350px;
      overflow-y: auto;
      padding: 15px 25px;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 0.85rem;
      line-height: 1.4;
      background: rgba(255, 255, 255, 0.5);
      color: #212529;
    }

    .log-content::-webkit-scrollbar {
      width: 8px;
    }

    .log-content::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 4px;
    }

    .log-content::-webkit-scrollbar-thumb {
      background: rgba(0, 123, 255, 0.3);
      border-radius: 4px;
      transition: background 0.3s ease;
    }

    .log-content::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 123, 255, 0.5);
    }

    .log-content li {
      margin-bottom: 4px;
      padding: 2px 0;
      border-radius: 3px;
      transition: background 0.2s ease;
    }

    .log-content li:hover {
      background: rgba(0, 123, 255, 0.05);
      padding-left: 8px;
      margin-left: -8px;
    }

    .log-content li:last-child {
      font-weight: 600;
      color: #007bff;
      background: rgba(0, 123, 255, 0.1);
      padding: 4px 8px;
      border-radius: 4px;
      border-left: 3px solid #007bff;
    }

    /* Modal Styling */
    .modal-custom {
      border-radius: 15px;
      border: none;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.95);
    }

    .modal-header-custom {
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      border-radius: 15px 15px 0 0;
      padding: 20px 25px;
      border-bottom: none;
    }

    .modal-title-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-icon {
      font-size: 1.3rem;
      color: rgba(255, 255, 255, 0.9);
    }

    .modal-close-custom {
      border-radius: 8px;
      padding: 8px;
      transition: all 0.3s ease;
      opacity: 0.8;
    }

    .modal-close-custom:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    .modal-body-custom {
      padding: 30px 25px;
      background: rgba(255, 255, 255, 0.9);
    }

    .input-container {
      margin-bottom: 20px;
    }

    .input-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: #495057;
      margin-bottom: 12px;
      font-size: 0.95rem;
    }

    .input-label i {
      color: #007bff;
      width: 16px;
      text-align: center;
    }

    .input-group-custom {
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .input-group-text-custom {
      background: rgba(0, 123, 255, 0.1);
      border: 1px solid rgba(0, 123, 255, 0.2);
      color: #007bff;
      border-right: none;
    }

    .form-control-custom {
      border: 1px solid rgba(0, 123, 255, 0.2);
      border-left: none;
      border-right: none;
      padding: 12px 15px;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .form-control-custom:focus {
      border-color: rgba(0, 123, 255, 0.4);
      box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.1);
      background: rgba(255, 255, 255, 0.95);
    }

    .toggle-password {
      background: rgba(0, 123, 255, 0.1);
      border: 1px solid rgba(0, 123, 255, 0.2);
      color: #007bff;
      cursor: pointer;
      transition: all 0.3s ease;
      border-left: none;
    }

    .toggle-password:hover {
      background: rgba(0, 123, 255, 0.2);
      color: #0056b3;
    }

    .modal-footer-custom {
      background: rgba(248, 249, 250, 0.8);
      border-radius: 0 0 15px 15px;
      padding: 20px 25px;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-btn-cancel {
      background: linear-gradient(135deg, #6c757d, #5a6268);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .modal-btn-save {
      background: linear-gradient(135deg, #28a745, #1e7e34);
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    @media (max-width: 768px) {
      .btn-group-custom {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-custom {
        min-width: auto;
        width: 100%;
      }

      .button-section {
        margin: 10px;
        padding: 20px;
      }

      .status-info-container {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .status-item {
        padding: 15px;
      }
    }
  </style>
  <script>
    var lang = "__LANG__";
    var I18n = __I18N__;

    function __(text, ...argv) {
      let result = text;
      if (I18n[lang]?.[text]) {
        result = I18n[lang][text];
        if (argv.length > 0) {
          argv.forEach((s) => {
            result = result.replace(/%s/, s);
          });
        }
      }
      return result;
    }

    // Initialize i18n on page load
    function initI18n() {
      // Replace text content for elements with data-i18n attribute
      document.querySelectorAll('[data-i18n]').forEach(element => {
        const key = element.getAttribute('data-i18n');
        element.textContent = __(key);
      });

      // Replace placeholder text for elements with data-i18n-placeholder attribute
      document.querySelectorAll('[data-i18n-placeholder]').forEach(element => {
        const key = element.getAttribute('data-i18n-placeholder');
        element.placeholder = __(key);
      });
    }

    // Initialize i18n when DOM is loaded
    document.addEventListener('DOMContentLoaded', initI18n);
  </script>
</head>
